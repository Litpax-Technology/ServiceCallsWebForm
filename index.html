<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Litpax — Enquiry Management</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--primary:#0d1526;--blue:#1a5fd8;--surface2:#f7f8fc;--surface3:#eef0f8;--border:#dde1f0;--text:#111827;--text2:#5a6080;--text3:#8890b0;--success:#00b894;--warning:#f9a825;--danger:#e17055;--accent:#e94560;--radius:10px;--shadow:0 2px 16px rgba(13,21,38,0.08);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--surface2);color:var(--text);min-height:100vh;padding-bottom:60px;}

  .header{background:var(--primary);color:white;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(13,21,38,0.22);}
  .header-inner{max-width:860px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px;}
  .logo{background:var(--blue);color:white;font-size:12px;font-weight:700;padding:5px 10px;border-radius:6px;letter-spacing:1px;font-family:'IBM Plex Mono',monospace;}
  .header-text h1{font-size:15px;font-weight:600;color:white;}
  .header-text p{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px;}
  .header-date{margin-left:auto;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,0.45);line-height:1.6;}

  .main{max-width:860px;margin:0 auto;padding:20px;}

  .card{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}
  .card-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
  .card-label::after{content:'';flex:1;height:1px;background:var(--border);}

  .enquiry-id-box{background:#e8f0fe;border:1.5px solid #b3d0f7;border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .enquiry-id-label{font-size:11px;color:var(--blue);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
  .enquiry-id-value{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:var(--blue);}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-grid .full{grid-column:1/-1;}
  @media(max-width:580px){.form-grid{grid-template-columns:1fr;}.form-grid .full{grid-column:1;}}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-group label{font-size:12px;font-weight:500;color:var(--text2);}
  .req{color:var(--accent);font-size:13px;}
  .form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'IBM Plex Sans',sans-serif;color:var(--text);background:var(--surface2);transition:all 0.2s;outline:none;width:100%;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);background:white;box-shadow:0 0 0 3px rgba(26,95,216,0.08);}
  .form-group textarea{resize:vertical;min-height:80px;}

  .tag-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
  .tag-opt{padding:8px 14px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;cursor:pointer;transition:all 0.2s;color:var(--text2);background:var(--surface2);user-select:none;}
  .tag-opt.yes.selected{background:#e8f8f4;border-color:var(--success);color:#00856e;font-weight:600;}
  .tag-opt.no.selected{background:#fff0ec;border-color:var(--danger);color:#c0392b;font-weight:600;}

  .nav-btns{display:flex;justify-content:flex-end;margin-top:24px;}
  .btn-submit{padding:12px 32px;border-radius:8px;border:none;background:var(--blue);color:white;font-size:14px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all 0.2s;}
  .btn-submit:hover{background:#1550c0;}
  .btn-submit:disabled{opacity:0.6;cursor:not-allowed;}

  .success-screen{display:none;text-align:center;padding:60px 20px;}
  .success-icon{width:72px;height:72px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;animation:pop 0.4s ease;}
  @keyframes pop{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
  .success-screen h2{font-size:22px;font-weight:600;margin-bottom:8px;}
  .success-screen p{font-size:14px;color:var(--text2);margin-bottom:20px;}
  .big-id{display:inline-block;background:#e8f0fe;color:var(--blue);border-radius:8px;padding:12px 24px;font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;margin-bottom:20px;}
  .summary-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .summary-row:last-child{border-bottom:none;}
  .summary-row span:first-child{color:var(--text2);}
  .summary-row span:last-child{font-weight:500;max-width:60%;text-align:right;}
  .btn-new{padding:12px 28px;border-radius:8px;border:none;background:var(--primary);color:white;font-size:14px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;margin-top:20px;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--primary);color:white;padding:12px 24px;border-radius:30px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
  .toast.show{opacity:1;}

  .page-title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px;}
  .page-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">LITPAX</div>
    <div class="header-text">
      <h1>Enquiry Management</h1>
      <p>Customer Enquiry — Log & Track</p>
    </div>
    <div class="header-date" id="headerDate"></div>
  </div>
</div>

<div class="main">

  <!-- FORM -->
  <div id="formScreen">
    <div class="page-title">📋 New Enquiry Entry</div>
    <div class="page-sub">Customer enquiry ka record darj karo</div>

    <!-- Auto Info -->
    <div class="card">
      <div class="card-label">Entry Info</div>
      <div class="enquiry-id-box">
        <div class="enquiry-id-label">Sr. No.</div>
        <div class="enquiry-id-value" id="srNoDisplay">Loading...</div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Date <span class="req">*</span></label>
          <input type="date" id="entryDate" required>
        </div>
        <div class="form-group">
          <label>Attended By <span class="req">*</span></label>
          <select id="attendedBy" required>
            <option value="">-- Select --</option>
            <option>Sukhpal</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Customer Info -->
    <div class="card">
      <div class="card-label">Customer Details</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Customer Name <span class="req">*</span></label>
          <input type="text" id="customerName" placeholder="Full name" required>
        </div>
        <div class="form-group">
          <label>Contact <span class="req">*</span></label>
          <input type="tel" id="contact" placeholder="Mobile number" required>
        </div>
        <div class="form-group">
          <label>OEM's <span class="req">*</span></label>
          <select id="oems" required>
            <option value="">-- Select OEM --</option>
            <option>Wariwo</option>
            <option>Zelio</option>
            <option>Urban</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Company Name</label>
          <input type="text" id="companyName" placeholder="Company / Dealer name">
        </div>
      </div>
    </div>

    <!-- Enquiry Details -->
    <div class="card">
      <div class="card-label">Enquiry Details</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Enquiry About <span class="req">*</span></label>
          <select id="enquiryAbout" required>
            <option value="">-- Select --</option>
            <option>Service</option>
            <option>Repairing</option>
            <option>Sales</option>
            <option>Technical Support</option>
            <option>General Inquiry</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Enquiry Closed <span class="req">*</span></label>
          <div class="tag-group">
            <div class="tag-opt yes" onclick="selectTag(this,'enquiryClosed','Yes')">✅ Yes</div>
            <div class="tag-opt no" onclick="selectTag(this,'enquiryClosed','No')">❌ No</div>
          </div>
          <input type="hidden" id="enquiryClosed" value="">
        </div>
        <div class="form-group full">
          <label>Response <span class="req">*</span></label>
          <select id="response" required>
            <option value="">-- Select Response --</option>
            <option>Voltage Issue</option>
            <option>Average Issue</option>
            <option>Charger Issue</option>
            <option>Connectivity / App Issue</option>
            <option>Cell Issue</option>
            <option>BMS Issue</option>
            <option>Parameter / Calibration Issue</option>
            <option>Hardware Issue (Wire / Connector)</option>
            <option>Inverter Issue</option>
            <option>General Inquiry</option>
            <option>Dispatch / Tracking</option>
            <option>Internal / Handover</option>
            <option>Battery Issue</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Solution</label>
          <textarea id="solution" placeholder="Problem ka solution kya tha..."></textarea>
        </div>
        <div class="form-group full">
          <label>Remarks</label>
          <textarea id="remarks" placeholder="Koi aur information..."></textarea>
        </div>
      </div>
    </div>

    <div class="nav-btns">
      <button class="btn-submit" onclick="submitEnquiry()" id="submitBtn">Submit Entry ✓</button>
    </div>
  </div>

  <!-- SUCCESS -->
  <div class="success-screen" id="successScreen">
    <div class="success-icon">📋</div>
    <h2>Enquiry Logged!</h2>
    <p>Entry successfully save ho gayi</p>
    <div class="big-id" id="successSrNo"></div>
    <div class="card" style="text-align:left;margin-bottom:0" id="summaryCard"></div>
    <button class="btn-new" onclick="resetForm()">+ Nayi Entry</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyvx_SWQyCWFdRVFm1Hdam7REmuZfJ_LfiE_aUGzH6tl23NpFY_3m6jLKP0JW3Vg583/exec';

  let nextSrNo = 1;

  window.onload = function() {
    const now = new Date();
    const opts = {weekday:'short', day:'numeric', month:'short', year:'numeric'};
    document.getElementById('headerDate').innerHTML = now.toLocaleDateString('en-IN', opts) + '<br>' + now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('entryDate').value = now.toISOString().split('T')[0];
    fetchNextSrNo();
  };

  function fetchNextSrNo() {
    document.getElementById('srNoDisplay').textContent = 'Loading...';
    window.handleSrNoData = function(result) {
      nextSrNo = result.lastSrNo || 1;
      document.getElementById('srNoDisplay').textContent = nextSrNo;
    };
    var oldScript = document.getElementById('srNoScript');
    if (oldScript) oldScript.remove();
    var script = document.createElement('script');
    script.id = 'srNoScript';
    script.onerror = function() {
      nextSrNo = 1;
      document.getElementById('srNoDisplay').textContent = '1';
    };
    script.src = APPS_SCRIPT_URL + '?action=getSrNo&callback=handleSrNoData';
    document.body.appendChild(script);
  }

  function selectTag(el, fieldId, val) {
    el.parentElement.querySelectorAll('.tag-opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById(fieldId).value = val;
  }

  function validateForm() {
    const required = document.querySelectorAll('#formScreen [required]');
    let valid = true, firstInvalid = null;
    required.forEach(el => {
      const val = el.tagName === 'SELECT' ? el.value : el.value.trim();
      if (!val) {
        el.style.borderColor = '#e94560';
        if (!firstInvalid) firstInvalid = el;
        valid = false;
      } else { el.style.borderColor = ''; }
    });
    if (!document.getElementById('enquiryClosed').value) {
      showToast('⚠️ Enquiry Closed select karo');
      return false;
    }
    if (!valid) { if (firstInvalid) firstInvalid.focus(); showToast('⚠️ Sabhi required fields bharein'); }
    return valid;
  }

  function submitEnquiry() {
    if (!validateForm()) return;

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = '⏳ Submitting...';

    const data = {
      action: 'addEnquiry',
      'Sr No': nextSrNo,
      'Date': document.getElementById('entryDate').value,
      'Customer Name': document.getElementById('customerName').value,
      'OEMs': document.getElementById('oems').value,
      'Company Name': document.getElementById('companyName').value,
      'Contact': document.getElementById('contact').value,
      'Enquiry About': document.getElementById('enquiryAbout').value,
      'Response': document.getElementById('response').value,
      'Solution': document.getElementById('solution').value,
      'Attended By': document.getElementById('attendedBy').value,
      'Enquiry Closed': document.getElementById('enquiryClosed').value,
      'Remarks': document.getElementById('remarks').value,
    };

    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });

    // Show success
    document.getElementById('formScreen').style.display = 'none';
    document.getElementById('successScreen').style.display = 'block';
    document.getElementById('successSrNo').textContent = 'Sr. No. — ' + nextSrNo;
    document.getElementById('summaryCard').innerHTML = `
      <div class="summary-row"><span>Customer</span><span>${data['Customer Name']}</span></div>
      <div class="summary-row"><span>OEM</span><span>${data['OEMs']}</span></div>
      <div class="summary-row"><span>Contact</span><span>${data['Contact']}</span></div>
      <div class="summary-row"><span>Enquiry About</span><span>${data['Enquiry About']}</span></div>
      <div class="summary-row"><span>Enquiry Closed</span><span>${data['Enquiry Closed']}</span></div>
      <div class="summary-row"><span>Attended By</span><span>${data['Attended By']}</span></div>`;
    window.scrollTo(0, 0);
  }

  function resetForm() {
    document.getElementById('formScreen').style.display = 'block';
    document.getElementById('successScreen').style.display = 'none';
    document.querySelectorAll('#formScreen input:not([type=hidden]), #formScreen select, #formScreen textarea').forEach(el => {
      if (el.type === 'date') el.value = new Date().toISOString().split('T')[0];
      else el.value = '';
    });
    document.querySelectorAll('#formScreen .tag-opt').forEach(o => o.classList.remove('selected'));
    document.getElementById('enquiryClosed').value = '';
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Entry ✓';
    fetchNextSrNo();
    window.scrollTo(0, 0);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
